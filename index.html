<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>EMDR Companion</title>
<meta name="theme-color" content="#2C4A34" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="icon" href="icons/icon-192.png" />
<link rel="apple-touch-icon" href="icons/icon-192.png" />
<link rel="stylesheet" href="css/styles.css" />
</head>
<body>
<div id="app">
  <header class="topbar">
    <div>
      <div class="eyebrow" id="eyebrow">EMDR Companion</div>
      <h1 id="page-title" style="font-size:22px;">Container</h1>
    </div>
    <div id="sync-indicator" class="small"></div>
  </header>

  <main id="view-root">
    <!-- populated by app.js -->
  </main>

  <nav class="tabs" id="tabs">
    <button data-view="home" class="active"><span class="icon">🏺</span>Container</button>
    <button data-view="ground"><span class="icon">🌿</span>Ground Me</button>
    <button data-view="safeplace"><span class="icon">🌲</span>Safe Place</button>
    <button data-view="summary"><span class="icon">📊</span>Summary</button>
    <button data-view="settings"><span class="icon">⚙️</span>Settings</button>
  </nav>
</div>

<script src="js/drive.js"></script>
<script src="js/skills.js"></script>
<script src="js/safeplace.js"></script>
<script src="js/summary.js"></script>
<script src="js/app.js"></script>
</body>
</html>
